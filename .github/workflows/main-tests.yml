name: Main Tests

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      SKIP_RAG_INIT: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Syntax check
        run: |
          python -m py_compile app.py server.py recommender.py api/parser.py ui/layout.py prompts/builder.py

      - name: Core regression tests
        run: |
          pytest -q \
            tests/test_language_policy.py \
            tests/test_recommender.py \
            tests/test_builder.py \
            tests/test_prompts.py \
            tests/test_hf_client.py \
            tests/test_schengen_calculator.py \
            tests/test_currency.py \
            tests/test_persona.py \
            tests/test_planb.py \
            tests/test_tax_warning.py \
            tests/test_data_schema.py \
            tests/test_link_validator.py
